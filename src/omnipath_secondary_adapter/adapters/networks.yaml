row:
    map:
        id_from_column: source
        match_type_from_column: entity_type_source
        match:
          - protein:
                to_subject: source_protein
                final_type: protein
          - complex:
                to_subject: source_complex
                final_type: macromolecular_complex
          - mirna:
                to_subject: mirna
          - small_molecule:
                to_subject: drug
          - lncrna:
                to_subject: lncrna

transformers:
    - OmniPath_directed
    # Genes
    - translate:
        id_from_column: source_genesymbol
        match_type_from_column: entity_type_source
        translations_file: data/HGNC/hgnc_complete_set.txt
        translate_from: symbol
        translate_to: ensembl_gene_id
        sep: "\t"
        match:
          - protein:
                to_object: source_gene
                final_type: gene
                via_relation: transcript_to_gene_relationship
    - translate:
        id_from_column: target_genesymbol
        match_type_from_column: entity_type_target
        translations_file: data/HGNC/hgnc_complete_set.txt
        translate_from: symbol
        translate_to: ensembl_gene_id
        sep: "\t"
        match:
          - protein:
                to_object: target_gene
                final_type: gene
                via_relation: transcript_to_gene_relationship
    # # Properties of for the node type 'source'
    - map:
        column: source_genesymbol
        to_property: gene_symbol
        for_object: source_protein
    - translate:
        column: source_genesymbol
        to_property: ensembl_gene_id
        for_objects: source_protein
        translations_file: data/HGNC/hgnc_complete_set.txt
        translate_from: symbol
        translate_to: ensembl_gene_id
        sep: "\t"
    - split:
        column: source_genesymbol
        to_property: name
        for_objects:
            - source_complex
            - mirna
            - drug
            - lncrna
        separator: "; "
    - map:
        column: ncbi_tax_id_source
        to_property: ncbi_tax_id
        for_objects:
            - source_protein
            - source_complex
            - mirna
            - drug
            - lncrna
    # # Properties of for the node type 'target'
    - map:
        column: target_genesymbol
        to_property: gene_symbol
        for_object: target_protein
    - translate:
        column: target_genesymbol
        to_property: ensembl_gene_id
        for_objects: target_protein
        translations_file: data/HGNC/hgnc_complete_set.txt
        translate_from: symbol
        translate_to: ensembl_gene_id
        sep: "\t"
    - split:
        column: target_genesymbol
        to_property: name
        for_objects: 
            - target_complex
            - mirna
        separator: "; "
    - map:
        column: ncbi_tax_id_target
        to_property: ncbi_tax_id
        for_objects:
            - target_protein
            - target_complex
            - mirna
    # Properties for genes
    - map:
        column: source_genesymbol
        to_property: gene_symbol
        for_object: source_gene
    - map:
        id_from_column: target_genesymbol
        to_property: gene_symbol
        for_object: target_gene
    # Properties for the edge type 'protein_protein_interaction'
